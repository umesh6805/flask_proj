<!DOCTYPE html>
<html><head><title>Signup</title>
<style>
body{font-family:Arial;background:#f4f4f4}
.container{width:350px;margin:40px auto;background:#fff;padding:20px;border-radius:8px;box-shadow:0 0 10px #ccc}
input{width:100%;padding:10px;margin:8px 0}
button{width:100%;padding:10px;background:#007bff;color:#fff;border:none}
.msg{color:red}
</style></head>
<body><div class="container">
<h2>Signup</h2>
{% with messages=get_flashed_messages() %}
{% if messages %}<div class="msg">{{messages[0]}}</div>{% endif %}
{% endwith %}
<form method="POST">
<input name="name" placeholder="Full Name" required>
<input type="email" name="email" placeholder="Email" required>
<input type="password" name="password" placeholder="Password" required>
<input type="password" name="confirm" placeholder="Confirm Password" required>
<button type="submit">Sign Up</button>
</form>
</div></body></html>
